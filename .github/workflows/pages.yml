name: Deploy site to GitHub Pages

# Publishes the website/ folder whenever you push changes to it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true        # auto-enable Pages (no manual setting needed)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .                 # the repo root is the website
      - id: deployment
        uses: actions/deploy-pages@v4
